services:
  postgres:
    image: postgres:16
    container_name: stock-postgres
    environment:
      POSTGRES_DB: stock
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock
    ports:
      - "5432:5432"
    volumes:
      - stock-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock -d stock"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: stock-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stock
      SPRING_DATASOURCE_USERNAME: stock
      SPRING_DATASOURCE_PASSWORD: stock
    ports:
      - "8080:8080"

volumes:
  stock-pgdata:
